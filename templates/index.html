<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC 311 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #12243a;
      --muted: #4a607d;
      --line: #d6e0ef;
      --accent: #0f62fe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #edf3ff, var(--bg));
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 8px; }
    .sub { color: var(--muted); margin: 0; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    input[type="date"], button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #b8c8e0;
      font-size: 14px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .kpi {
      background: #f8fbff;
      border: 1px solid #dce7f7;
      border-radius: 10px;
      padding: 12px;
      min-height: 90px;
    }
    .kpi .label { color: var(--muted); font-size: 13px; }
    .kpi .value {
      margin-top: 6px;
      font-size: 26px;
      font-weight: 700;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .kpi-list {
      margin: 8px 0 0;
      padding-left: 18px;
      font-size: 14px;
      font-weight: 600;
    }
    .kpi-list li { margin-bottom: 4px; }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid #edf1f7;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    .status { min-height: 22px; color: var(--muted); }
    .visual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .visual-card {
      border: 1px solid #dce7f7;
      border-radius: 10px;
      background: #f8fbff;
      padding: 10px;
    }
    .visual-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--muted);
    }
    .visual-card img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #edf1f7;
      display: block;
      cursor: zoom-in;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10, 18, 35, 0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 9999;
    }
    .lightbox.open { display: flex; }
    .lightbox-content {
      position: relative;
      width: min(96vw, 1280px);
      max-height: 92vh;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #d6e0ef;
    }
    .lightbox-close {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      background: #12243a;
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .lightbox img {
      width: 100%;
      max-height: calc(92vh - 40px);
      object-fit: contain;
      display: block;
      border-radius: 8px;
      border: 1px solid #edf1f7;
    }
    pre {
      background: #0f1724;
      color: #dbe7ff;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
      max-height: 260px;
      overflow: auto;
      font-size: 12px;
    }
    @media (max-width: 900px) {
      .row, .kpis, .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>NYC 311 Backend Dashboard</h1>
      <p class="sub">Run scripts with a date filter and view aggregated outputs.</p>
    </div>

    <div class="panel">
      <div class="row">
        <div>
          <label for="startDate">Start Date</label>
          <input id="startDate" type="date" />
        </div>
        <div>
          <label for="endDate">End Date</label>
          <input id="endDate" type="date" />
        </div>
        <button id="refreshBtn" style="background:#334e72;">Refresh Results</button>
      </div>
      <p id="status" class="status"></p>
    </div>

    <div class="panel kpis">
      <div class="kpi"><div class="label">Total Requests</div><div id="kpiTotal" class="value">-</div></div>
      <div class="kpi"><div class="label">Boroughs</div><div id="kpiBoroughs" class="value">-</div></div>
      <div class="kpi"><div class="label">Top Complaint Count</div><div id="kpiTopCount" class="value">-</div></div>
      <div class="kpi">
        <div class="label">
          Top Complaint Types
          <select id="topNSelect" style="margin-left:8px;">
            <option value="1">Top 1</option>
            <option value="2">Top 2</option>
            <option value="3" selected>Top 3</option>
            <option value="4">Top 4</option>
            <option value="5">Top 5</option>
          </select>
        </div>
        <div id="kpiTopType" class="value" style="font-size:16px;">-</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3>Borough Counts</h3>
        <canvas id="boroughChart"></canvas>
        <div id="boroughTable"></div>
      </div>
      <div class="panel">
        <h3>High Volume Boroughs</h3>
        <canvas id="highVolumeChart"></canvas>
        <div id="highVolumeTable"></div>
      </div>
      <div class="panel">
        <h3>Hourly Trend</h3>
        <canvas id="hourlyChart"></canvas>
        <div id="hourlyTable"></div>
      </div>
      <div class="panel">
        <h3>Monthly Trend</h3>
        <canvas id="monthlyChart"></canvas>
        <div id="monthlyTable"></div>
      </div>
    </div>

    <div class="panel">
      <h3>Top Complaints</h3>
      <canvas id="complaintsChart"></canvas>
      <div id="complaintsTable"></div>
    </div>

    <div class="panel">
      <h3>Generated Visualizations</h3>
      <div id="visualsGrid" class="visual-grid"></div>
    </div>

  </div>
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <div class="lightbox-content">
      <button id="lightboxClose" class="lightbox-close" type="button">Close</button>
      <img id="lightboxImage" src="" alt="Visualization preview" />
    </div>
  </div>

  <script>
    const state = { charts: {}, lastPayload: null };
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxClose = document.getElementById("lightboxClose");

    function openLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt || "Visualization preview";
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
    }

    function fmt(value) {
      if (value === null || value === undefined || value === "") return "-";
      return typeof value === "number" ? value.toLocaleString() : String(value);
    }

    function renderTable(containerId, rows) {
      const root = document.getElementById(containerId);
      if (!rows || rows.length === 0) {
        root.innerHTML = "<p>No data.</p>";
        return;
      }
      const cols = Object.keys(rows[0]);
      const head = cols.map(c => `<th>${c}</th>`).join("");
      const body = rows.map(r => `<tr>${cols.map(c => `<td>${fmt(r[c])}</td>`).join("")}</tr>`).join("");
      root.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function upsertChart(key, canvasId, type, labels, values, label) {
      const ctx = document.getElementById(canvasId).getContext("2d");
      if (state.charts[key]) state.charts[key].destroy();
      state.charts[key] = new Chart(ctx, {
        type,
        data: {
          labels,
          datasets: [{
            label,
            data: values,
            borderColor: "#0f62fe",
            backgroundColor: "rgba(15,98,254,0.25)",
            fill: type === "line",
            tension: 0.25
          }]
        },
        options: { responsive: true, maintainAspectRatio: true }
      });
    }

    function renderResults(payload) {
      state.lastPayload = payload;
      const { summary, datasets, visuals } = payload;
      document.getElementById("kpiTotal").textContent = fmt(summary.total_requests);
      document.getElementById("kpiBoroughs").textContent = fmt(summary.boroughs);
      document.getElementById("kpiTopCount").textContent = fmt(summary.top_complaint_count);
      const topN = Number(document.getElementById("topNSelect").value || 3);
      const topList = (summary.top_complaints || []).slice(0, topN);
      const topTypeEl = document.getElementById("kpiTopType");
      if (!topList.length) {
        topTypeEl.textContent = "-";
      } else {
        topTypeEl.innerHTML = `<ol class="kpi-list">${topList.map(item => `<li>${fmt(item.complaint_type)} (${fmt(item.count)})</li>`).join("")}</ol>`;
      }

      const borough = datasets.borough_counts.rows || [];
      renderTable("boroughTable", borough);
      upsertChart("borough", "boroughChart", "bar", borough.map(r => r.borough), borough.map(r => r.count), "Count");

      const highVolume = datasets.high_volume_boroughs.rows || [];
      renderTable("highVolumeTable", highVolume);
      upsertChart("highVolume", "highVolumeChart", "bar", highVolume.map(r => r.borough), highVolume.map(r => r.count), "Count");

      const hourly = [...(datasets.hourly_trend.rows || [])].sort((a, b) => Number(a.hour) - Number(b.hour));
      renderTable("hourlyTable", hourly);
      upsertChart("hourly", "hourlyChart", "line", hourly.map(r => r.hour), hourly.map(r => r.count), "Count");

      const monthly = datasets.monthly_trend.rows || [];
      const monthLabels = monthly.map(r => `${r.year}-${String(r.month).padStart(2, "0")}`);
      renderTable("monthlyTable", monthly);
      upsertChart("monthly", "monthlyChart", "line", monthLabels, monthly.map(r => r.count), "Count");

      const complaints = datasets.top_complaints.rows || [];
      renderTable("complaintsTable", complaints);
      upsertChart("complaints", "complaintsChart", "bar", complaints.map(r => r.complaint_type), complaints.map(r => r.count), "Count");

      const visualRoot = document.getElementById("visualsGrid");
      if (!visuals || visuals.length === 0) {
        visualRoot.innerHTML = "<p>No PNG visualizations found. Run the pipeline first.</p>";
      } else {
        visualRoot.innerHTML = visuals.map(v => (
          `<div class="visual-card"><h4>${v.name.replace(/\.png$/i, "").replace(/_/g, " ")}</h4><img class="visual-thumb" src="${v.url}?t=${Date.now()}" data-full="${v.url}?t=${Date.now()}" alt="${v.name}" /></div>`
        )).join("");
        document.querySelectorAll(".visual-thumb").forEach(img => {
          img.addEventListener("click", () => openLightbox(img.dataset.full, img.alt));
        });
      }
    }

    function clearResults() {
      document.getElementById("kpiTotal").textContent = "-";
      document.getElementById("kpiBoroughs").textContent = "-";
      document.getElementById("kpiTopCount").textContent = "-";
      document.getElementById("kpiTopType").textContent = "-";

      renderTable("boroughTable", []);
      renderTable("highVolumeTable", []);
      renderTable("hourlyTable", []);
      renderTable("monthlyTable", []);
      renderTable("complaintsTable", []);
      document.getElementById("visualsGrid").innerHTML = "<p>No data.</p>";

      Object.values(state.charts).forEach(chart => chart.destroy());
      state.charts = {};
    }

    async function loadCurrentResults() {
      const resp = await fetch("/api/results");
      const data = await resp.json();
      if (data.ok) renderResults(data);
    }

    async function runPipeline(actionLabel = "Running scripts... this can take a few minutes.") {
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const status = document.getElementById("status");
      const refreshBtn = document.getElementById("refreshBtn");

      if (!startDate || !endDate) {
        status.textContent = "Please select both start and end dates.";
        return;
      }
      if (startDate > endDate) {
        status.textContent = "Start date must be on or before end date.";
        return;
      }

      refreshBtn.disabled = true;
      status.textContent = actionLabel;

      try {
        const resp = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ start_date: startDate, end_date: endDate })
        });
        const data = await resp.json();

        if (!resp.ok || !data.ok) {
          status.textContent = data.error || "Pipeline failed.";
          return;
        }

        status.textContent = "Completed successfully.";
        renderResults(data);
      } catch (err) {
        status.textContent = `Request failed: ${err}`;
      } finally {
        refreshBtn.disabled = false;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", () => runPipeline("Refreshing by rerunning for selected date range..."));
    document.getElementById("topNSelect").addEventListener("change", () => {
      if (state.lastPayload) renderResults(state.lastPayload);
    });
    document.getElementById("startDate").addEventListener("change", () => {
      if (document.getElementById("endDate").value) runPipeline("Date changed. Running for selected date range...");
    });
    document.getElementById("endDate").addEventListener("change", () => {
      if (document.getElementById("startDate").value) runPipeline("Date changed. Running for selected date range...");
    });

    document.getElementById("startDate").value = "";
    document.getElementById("endDate").value = "";
    clearResults();

    lightboxClose.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && lightbox.classList.contains("open")) closeLightbox();
    });
  </script>
</body>
</html>
